version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: inventory_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: MySecurePass123!
      MYSQL_DATABASE: inventory_sales
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 40s

  app:
    build: .
    container_name: inventory_app
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: inventory_sales
      DB_USER: root
      DB_PASSWORD: MySecurePass123!
      JWT_SECRET: bXktc3VwZXItc2VjdXJlLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLWNoYW5nZS1pbi1wcm9k
    ports:
      - "8080:8080"

volumes:
  mysql_data: